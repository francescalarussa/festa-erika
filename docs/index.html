<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Festa di saluto</title>

<style>
html, body {
  height: 100%;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0b1a, #000);
  color: white;
  overflow-x: hidden;
}

/* ⭐ STELLE */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
  top: 0;
  left: 0;
}

.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-800px); opacity: 0; }
}

.container {
  position: relative;
  z-index: 2;
  max-width: 900px;
  margin: auto;
  padding: 40px;
  text-align: center;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 5px;
}

.subtitle {
  opacity: 0.8;
}

.date, .location {
  opacity: 0.7;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 25px;
  margin-top: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: linear-gradient(90deg,#ff4ecd,#7c4dff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.item {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

  <div class="hero">
    <h1>🎉 Festa di saluto</h1>
    <p class="subtitle"><strong>ERIKA</strong> parte per Bologna ✨</p>
    <p class="date">📅 28 Giugno 2026 • 18:30</p>
    <p class="location">📍 Via San Sebastiano 26, Nole (TO)</p>
  </div>

  <div class="card">
    <h3>Conferma presenza</h3>

    <input id="nome" placeholder="Nome">
    <input id="persone" type="number" placeholder="Persone">

    <button onclick="addRSVP()">Conferma 🚀</button>
  </div>

  <div class="card">
    <h3>📋 Lista invitati</h3>
    <div id="list"></div>
  </div>

</div>

<!-- ⭐ STELLE FIX -->
<script>
window.addEventListener("DOMContentLoaded", () => {
  const stars = document.getElementById("stars");

  for (let i = 0; i < 100; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDuration = (2 + Math.random() * 5) + "s";
    stars.appendChild(s);
  }
});
</script>

<!-- 🔥 FIREBASE MODERNO -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG (INSERITA) */
const firebaseConfig = {
  apiKey: "AIzaSyClBlef2bnEdC_y2GO_ixngywQMlUSQUUg",
  authDomain: "festa-erika.firebaseapp.com",
  projectId: "festa-erika",
  storageBucket: "festa-erika.firebasestorage.app",
  messagingSenderId: "201063866010",
  appId: "1:201063866010:web:d159e8023ff963ce220923",
  measurementId: "G-55V9KE3XQX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rsvpRef = collection(db, "rsvp");

/* ➕ RSVP FUNZIONE */
globalThis.addRSVP = async function () {
  const nome = document.getElementById("nome").value;
  const persone = document.getElementById("persone").value;

  if (!nome) return;

  await addDoc(rsvpRef, {
    nome,
    persone: persone || 1,
    time: Date.now()
  });

  document.getElementById("nome").value = "";
  document.getElementById("persone").value = "";
};

/* 📡 LIVE LIST */
const q = query(rsvpRef, orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach((doc) => {
    const d = doc.data();

    list.innerHTML += `
      <div class="item">
        👤 ${d.nome} — 👥 ${d.persone || 1}
      </div>
    `;
  });
});
</script>

</body>
</html>
