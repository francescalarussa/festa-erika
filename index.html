<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Festa di saluto</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0b1a, #000);
  color: white;
  overflow-x: hidden;
}

.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-800px); opacity: 0; }
}

.container {
  position: relative;
  z-index: 2;
  max-width: 900px;
  margin: auto;
  padding: 40px;
  text-align: center;
}

.hero h1 {
  font-size: 44px;
  font-weight: bold;
  background: linear-gradient(90deg,#ff4ecd,#7c4dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  opacity: 0.8;
  margin-top: 5px;
}

.date, .location {
  opacity: 0.7;
  margin-top: 5px;
}

.countdown {
  margin-top: 15px;
  font-size: 18px;
  color: #ff4ecd;
  font-weight: bold;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 25px;
  margin-top: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: linear-gradient(90deg,#ff4ecd,#7c4dff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.rsvp-list {
  text-align: left;
  margin-top: 15px;
}

.item {
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

  <div class="hero">
    <h1>🎉 Festa di saluto</h1>
    <p class="subtitle">per <strong>ERIKA</strong></p>
    <p class="subtitle">Una serata insieme prima della nuova avventura ✨</p>

    <p class="date">📅 28 Giugno 2026 • 18.30</p>
    <p class="location">📍 Via San Sebastiano 26, Nole (TO)</p>

    <div id="countdown" class="countdown"></div>
  </div>

  <div class="card">
    <h3>Conferma presenza</h3>

    <input id="nome" placeholder="Nome">
    <input id="persone" type="number" placeholder="Persone">

    <button onclick="addRSVP()">Conferma 🚀</button>
  </div>

  <div class="card">
    <h3>📋 Lista invitati</h3>
    <div id="list" class="rsvp-list"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
/* STELLE */
const stars = document.getElementById("stars");
for (let i = 0; i < 80; i++) {
  const s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * 100 + "%";
  s.style.top = Math.random() * 100 + "%";
  s.style.animationDuration = (2 + Math.random() * 5) + "s";
  stars.appendChild(s);
}

/* COUNTDOWN */
const eventDate = new Date("2026-07-12T19:30:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const diff = eventDate - now;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

  document.getElementById("countdown").innerHTML =
    `⏳ ${days} giorni e ${hours} ore`;
}
setInterval(updateCountdown, 1000);
updateCountdown();

/* FIREBASE */
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection("rsvp");

/* RSVP */
function addRSVP() {
  const nome = document.getElementById("nome").value;
  const persone = document.getElementById("persone").value;

  if (!nome) return;

  col.add({
    nome,
    persone,
    time: Date.now()
  });

  document.getElementById("nome").value = "";
  document.getElementById("persone").value = "";
}

/* LIVE LIST */
col.orderBy("time","desc").onSnapshot(snapshot => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();
    list.innerHTML += `
      <div class="item">
        👤 ${d.nome} — 👥 ${d.persone || 1}
      </div>
    `;
  });
});
</script>

</body>
</html>
